<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarterly Update</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header">
            <h3>Quarterly Goal Update</h3>
        </div>

        <div class="card-body">
            <form method="POST">

                <div class="mb-3">
                    <label>Select Quarter</label>
                    <select name="quarter" class="form-control" required>
                        <option value="Q1">Q1</option>
                        <option value="Q2">Q2</option>
                        <option value="Q3">Q3</option>
                        <option value="Q4">Q4</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>Achievement</label>
                    <input type="number" name="achievement" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary">
                    Submit Update
                </button>

                <a href="/employee" class="btn btn-secondary">
                    Back
                </a>

            </form>
        </div>
    </div>
</div>

</body>
</html>
