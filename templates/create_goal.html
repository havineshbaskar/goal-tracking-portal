<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Goal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header">
            <h3>Create Goal</h3>
        </div>
        <div class="card-body">
            <form method="POST">

                <div class="mb-3">
                    <label>Goal Title</label>
                    <input type="text" name="title" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Description</label>
                    <textarea name="description" class="form-control" required></textarea>
                </div>

                <div class="mb-3">
                    <label>Unit of Measurement</label>
                    <select name="uom" class="form-control" required>
                        <option value="Numeric">Numeric</option>
                        <option value="Percentage">Percentage</option>
                        <option value="Zero">Zero</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>Target</label>
                    <input type="number" name="target" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Weightage (%)</label>
                    <input type="number" name="weightage" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary">
                    Submit Goal
                </button>

                <a href="/employee" class="btn btn-secondary">
                    Back
                </a>

            </form>
        </div>
    </div>
</div>

</body>
</html>
