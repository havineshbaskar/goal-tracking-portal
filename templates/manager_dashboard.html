<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <div class="d-flex justify-content-between mb-4">
        <h2>Manager Dashboard</h2>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Goal Title</th>
                <th>Description</th>
                <th>Target</th>
                <th>Weightage</th>
                <th>Status</th>
                <th>Comment</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for goal in goals %}
            <tr>
                <td>{{ goal.title }}</td>
                <td>{{ goal.description }}</td>
                <td>{{ goal.target }}</td>
                <td>{{ goal.weightage }}%</td>
                <td>{{ goal.status }}</td>
                <td>
                    <form method="POST">
                        <input type="text" name="comment" class="form-control" placeholder="Add comment">
                </td>
                <td>
                        <button formaction="/approve/{{ goal.id }}" class="btn btn-success btn-sm">
                            Approve
                        </button>
                        <button formaction="/reject/{{ goal.id }}" class="btn btn-danger btn-sm">
                            Reject
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
